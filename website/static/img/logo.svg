<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25c2a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e8555;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Shield Outline -->
  <path d="M100 20 L160 50 L160 100 C160 140 130 170 100 180 C70 170 40 140 40 100 L40 50 Z" 
        fill="none" 
        stroke="url(#grad1)" 
        stroke-width="6"/>
  
  <!-- Shield Fill -->
  <path d="M100 30 L150 55 L150 100 C150 135 125 160 100 170 C75 160 50 135 50 100 L50 55 Z" 
        fill="url(#grad1)" 
        opacity="0.9"/>
  
  <!-- V Letter -->
  <path d="M75 65 L100 125 L125 65" 
        fill="none" 
        stroke="white" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Lock Icon (security) -->
  <circle cx="100" cy="145" r="12" fill="url(#grad2)"/>
  <rect x="92" y="140" width="16" height="12" rx="2" fill="url(#grad2)"/>
  <circle cx="100" cy="144" r="4" fill="white"/>
</svg>