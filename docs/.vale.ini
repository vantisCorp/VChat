# Vale Linting Configuration for V-COMM Documentation

[*.md]
Vale.Vocabulary = NO
Vale.We = NO
Vale.Microsoft = YES

# Style dla dokumentacji technicznej
[*.md]
basedOnStyles = Vale

# Wyłącz reguły dla polskiego języka
Vale.Spelling = NO

# Szczegółowe reguły dla dokumentacji deweloperskiej
[developers/*.md]
Vale.Repetition = YES
Vale.Terms = YES

# Reguły dla dokumentacji API
[developers/api/*.md]
Vale.Headings = YES
Vale.Lists = YES
Vale.Terminology = YES