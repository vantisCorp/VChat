name: Discord & Slack Notifications

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed, merged]
  release:
    types: [published]
  issues:
    types: [opened, closed, labeled]
  workflow_run:
    workflows: ["V-COMM CI/CD Pipeline", "Sentry Telemetry", "Socket.dev AI Security"]
    types: [completed]
  star:
    types: [created]
  watch:
    types: [started]

env:
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  # Discord Notifications
  notify-discord:
    name: 📢 Discord Notification
    runs-on: ubuntu-latest
    if: env.DISCORD_WEBHOOK != ''
    steps:
      - name: Push Notification
        if: github.event_name == 'push'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚀 **Push to Main** - V-COMM
            **Branch:** ${{ github.ref_name }}
            **Commit:** `${{ github.sha }}`
            **Author:** ${{ github.actor }}
            **Message:** ${{ github.event.head_commit.message }}

      - name: Pull Request Notification
        if: github.event_name == 'pull_request'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            📝 **Pull Request ${{ github.event.action }}** - V-COMM
            
            **PR #${{ github.event.pull_request.number }}:** ${{ github.event.pull_request.title }}
            **Author:** ${{ github.event.pull_request.user.login }}
            **Branch:** ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}
            ${{ github.event.pull_request.html_url }}

      - name: Release Notification
        if: github.event_name == 'release'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🎉 **New Release** - V-COMM
            
            **Version:** ${{ github.event.release.tag_name }}
            **Name:** ${{ github.event.release.name }}
            ${{ github.event.release.html_url }}

      - name: Issue Notification
        if: github.event_name == 'issues'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🐛 **Issue ${{ github.event.action }}** - V-COMM
            
            **Issue #${{ github.event.issue.number }}:** ${{ github.event.issue.title }}
            **Author:** ${{ github.event.issue.user.login }}
            ${{ github.event.issue.html_url }}

      - name: Star Notification
        if: github.event_name == 'star'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            ⭐ **New Star!** - V-COMM
            
            **User:** ${{ github.actor }}
            **Total Stars:** ${{ github.event.repository.stargazers_count }}
            
            Thanks for the support! 🙏

      - name: Workflow Failure Notification
        if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            ❌ **Workflow Failed** - V-COMM
            
            **Workflow:** ${{ github.event.workflow_run.name }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Run:** ${{ github.event.workflow_run.html_url }}

  # Slack Notifications
  notify-slack:
    name: 💬 Slack Notification
    runs-on: ubuntu-latest
    if: env.SLACK_WEBHOOK != ''
    steps:
      - name: Push to Slack
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 V-COMM - New Push to Main"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}"},
                    {"type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`"},
                    {"type": "mrkdwn", "text": "*Message:*\n${{ github.event.head_commit.message }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Commit"},
                      "url": "${{ github.event.head_commit.url }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: PR to Slack
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "📝 New Pull Request"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*PR:*\n#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}"},
                    {"type": "mrkdwn", "text": "*Author:*\n${{ github.event.pull_request.user.login }}"},
                    {"type": "mrkdwn", "text": "*Branch:*\n${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "Review PR"},
                      "url": "${{ github.event.pull_request.html_url }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Release to Slack
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🎉 New Release: ${{ github.event.release.tag_name }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Version:*\n${{ github.event.release.tag_name }}"},
                    {"type": "mrkdwn", "text": "*Name:*\n${{ github.event.release.name }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Release"},
                      "url": "${{ github.event.release.html_url }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # Summary Notification (Daily Digest)
  daily-digest:
    name: 📊 Daily Digest
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Generate Digest
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // Get today's stats
            const stars = await github.rest.activity.listStargazersForRepo({
              owner, repo, per_page: 100
            });
            
            const issues = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', since: new Date(Date.now() - 86400000).toISOString()
            });
            
            const prs = await github.rest.pulls.list({
              owner, repo, state: 'all'
            });
            
            console.log(`⭐ Stars: ${stars.data.length}`);
            console.log(`🐛 Issues (24h): ${issues.data.length}`);
            console.log(`📝 PRs: ${prs.data.length}`);

      - name: Send Digest to Discord
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            📊 **Daily Digest** - V-COMM
            
            **Date:** ${{ github.event.head_commit.timestamp || 'Today' }}
            
            Check the repository for the latest updates!
            https://github.com/vantisCorp/VChat