name: SBOM Generation

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '8.14.1'

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.15.0
        with:
          artifact-name: sbom.spdx.json
          format: spdx-json
          output-file: sbom.spdx.json
        continue-on-error: true
          
      - name: Generate CycloneDX SBOM
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-file sbom.cyclonedx.json || echo "No package.json found"
        continue-on-error: true
          
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90
        continue-on-error: true
          
      - name: Commit SBOM
        if: github.event_name == 'push' || github.event_name == 'release'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sbom.spdx.json sbom.cyclonedx.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update SBOM [skip ci]"
          git push