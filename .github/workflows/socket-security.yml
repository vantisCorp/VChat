name: Socket.dev AI Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily security scan at 2:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '8.14.1'

jobs:
  # Socket.dev Security Analysis
  socket-security:
    name: 🔒 Socket Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Socket.dev Security Scan
        uses: socketsdev/socket-security-action@v1
        with:
          workflow: 'true'
          input_workflow_url: ${{ github.event.pull_request.html_url || github.event.repository.html_url }}
          fail_on_issues: false
          surface_new_issues: true
          summary: true
          comment: true
          issue_comment: true
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
        continue-on-error: true

  # Deep Dependency Analysis
  dependency-analysis:
    name: 📦 Dependency Analysis
    runs-on: ubuntu-latest
    needs: socket-security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Socket CLI
        run: npm install -g @socketsdev/cli
        continue-on-error: true

      - name: Analyze Dependencies
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
        run: |
          echo "🔍 Running deep dependency analysis..."
          
          # Run Socket audit
          socket audit --json > socket-report.json 2>&1 || true
          
          # Parse results
          if [ -f socket-report.json ]; then
            echo "✅ Socket report generated"
            cat socket-report.json
          else
            echo "⚠️ No socket report generated"
          fi
        continue-on-error: true

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: socket-security-report
          path: socket-report.json
        continue-on-error: true