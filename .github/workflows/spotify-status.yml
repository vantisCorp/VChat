name: Spotify Live Status

on:
  schedule:
    # Update every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-spotify-status:
    name: 🎵 Update Spotify Status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Current Playing
        id: spotify
        env:
          SPOTIFY_ACCESS_TOKEN: ${{ secrets.SPOTIFY_ACCESS_TOKEN }}
        run: |
          echo "🎵 Checking Spotify status..."
          
          # Create badges directory
          mkdir -p .github/badges
          
          # Check if we have credentials
          if [ -z "$SPOTIFY_ACCESS_TOKEN" ]; then
            echo "No Spotify credentials configured"
            echo "track-name=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Try to fetch currently playing track
          RESPONSE=$(curl -s -H "Authorization: Bearer $SPOTIFY_ACCESS_TOKEN" \
            "https://api.spotify.com/v1/me/player/currently-playing" 2>/dev/null || echo "")
          
          if [ -z "$RESPONSE" ] || [ "$RESPONSE" = "" ]; then
            echo "No track currently playing"
            echo "track-name=" >> $GITHUB_OUTPUT
          else
            # Parse JSON response
            TRACK_NAME=$(echo "$RESPONSE" | jq -r '.item.name // empty' 2>/dev/null || echo "")
            ARTIST_NAME=$(echo "$RESPONSE" | jq -r '.item.artists[0].name // empty' 2>/dev/null || echo "")
            TRACK_URL=$(echo "$RESPONSE" | jq -r '.item.external_urls.spotify // empty' 2>/dev/null || echo "")
            
            echo "track-name=$TRACK_NAME" >> $GITHUB_OUTPUT
            echo "artist-name=$ARTIST_NAME" >> $GITHUB_OUTPUT
            echo "track-url=$TRACK_URL" >> $GITHUB_OUTPUT
            
            echo "🎵 Currently Playing: $TRACK_NAME by $ARTIST_NAME"
          fi

      - name: Update README
        if: steps.spotify.outputs.track-name != ''
        env:
          TRACK_NAME: ${{ steps.spotify.outputs.track-name }}
          ARTIST_NAME: ${{ steps.spotify.outputs.artist-name }}
          TRACK_URL: ${{ steps.spotify.outputs.track-url }}
        run: |
          echo "🎵 Currently Playing: $TRACK_NAME by $ARTIST_NAME"
          
          # Create Spotify status section
          mkdir -p .github/badges
          
          cat > .github/badges/spotify.json << EOF
          {
            "playing": true,
            "track": {
              "name": "$TRACK_NAME",
              "artist": "$ARTIST_NAME",
              "url": "$TRACK_URL"
            },
            "updated_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF
          
          # Create SVG badge
          cat > .github/badges/spotify.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="300" height="20" viewBox="0 0 300 20">
            <rect width="300" height="20" fill="#1DB954" rx="3"/>
            <text x="25" y="14" font-family="Arial, sans-serif" font-size="11" fill="white">
              🎵 $TRACK_NAME - $ARTIST_NAME
            </text>
          </svg>
          EOF

      - name: No Track Playing
        if: steps.spotify.outputs.track-name == ''
        run: |
          mkdir -p .github/badges
          
          cat > .github/badges/spotify.json << EOF
          {
            "playing": false,
            "track": null,
            "updated_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF
          
          cat > .github/badges/spotify.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="200" height="20" viewBox="0 0 200 20">
            <rect width="200" height="20" fill="#1DB954" rx="3"/>
            <text x="25" y="14" font-family="Arial, sans-serif" font-size="11" fill="white">
              🎵 Not playing
            </text>
          </svg>
          EOF

      - name: Commit Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .github/badges/spotify.* 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Spotify status [skip ci]"
            git push
          fi