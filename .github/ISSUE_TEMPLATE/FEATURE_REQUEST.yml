<?xml version="1.0"?><feature_request xmlns="http://example.com"><name>✨ Feature Request</name><description>Suggest a new feature or enhancement</description><title>[FEATURE] </title><labels>["enhancement", "needs-triage"]</labels><assignees>[]</assignees><body><markdown>Thanks for suggesting a new feature for V-COMM! Please provide as much detail as possible to help us understand your request.</markdown><textarea id="problem"><label>Problem Statement</label><description>What problem does this feature solve?</description><placeholder>Currently, I can't do X because...</placeholder><required>true</required></textarea><textarea id="solution"><label>Proposed Solution</label><description>What would you like to see implemented?</description><placeholder>I'd like to be able to...</placeholder><required>true</required></textarea><textarea id="alternatives"><label>Alternative Solutions</label><description>Have you considered any alternative solutions?</description><placeholder>Alternatively, we could...</textarea><textarea id="usecase"><label>Use Cases</label><description>Describe specific use cases for this feature</description><placeholder>- Use case 1: ... - Use case 2: ... - Use case 3: ...</textarea><dropdown id="priority"><label>Priority</label><description>How important is this feature to you?</description><options>- Critical - blocking current work - High - important for next release - Medium - nice to have - Low - not urgent</options><default>Medium</default><required>true</required></dropdown><dropdown id="complexity"><label>Estimated Complexity</label><description>How complex do you think this feature is?</description><options>- Simple - can be done quickly - Medium - requires some work - Complex - significant effort - Unknown - not sure</options><default>Medium</default></dropdown><checkboxes id="contribution"><label>Willing to Contribute</label><options>- label: I'd be willing to implement this feature - label: I'd be willing to help test this feature - label: I'd be willing to help document this feature</options></checkboxes><textarea id="additional"><label>Additional Context</label><description>Any other relevant information, mockups, or examples</description></textarea></body></feature_request>