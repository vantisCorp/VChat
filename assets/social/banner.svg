<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914"/>
      <stop offset="100%" style="stop-color:#b20710"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#e50914" opacity="0.1"/>
  <circle cx="1180" cy="540" r="300" fill="#e50914" opacity="0.05"/>
  
  <!-- Logo/Brand area -->
  <g filter="url(#shadow)">
    <!-- V-COMM Logo -->
    <text x="640" y="280" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="url(#logo)" text-anchor="middle" filter="url(#glow)">V-COMM</text>
    
    <!-- Tagline -->
    <text x="640" y="360" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" opacity="0.9">Secure Communication Platform</text>
    
    <!-- Subtitle -->
    <text x="640" y="420" font-family="Arial, sans-serif" font-size="24" fill="#888888" text-anchor="middle">Zero Trust • End-to-End Encryption • Post-Quantum Security</text>
  </g>
  
  <!-- Features -->
  <g transform="translate(200, 500)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#ffffff" opacity="0.1"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">🔒 E2E Encryption</text>
    <text x="100" y="60" font-family="Arial, sans-serif" font-size="14" fill="#aaaaaa" text-anchor="middle">Military-grade security</text>
  </g>
  
  <g transform="translate(440, 500)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#ffffff" opacity="0.1"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">🎤 Voice &amp; Video</text>
    <text x="100" y="60" font-family="Arial, sans-serif" font-size="14" fill="#aaaaaa" text-anchor="middle">Crystal clear calls</text>
  </g>
  
  <g transform="translate(680, 500)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#ffffff" opacity="0.1"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">⚡ Real-time</text>
    <text x="100" y="60" font-family="Arial, sans-serif" font-size="14" fill="#aaaaaa" text-anchor="middle">Low latency messaging</text>
  </g>
  
  <g transform="translate(920, 500)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#ffffff" opacity="0.1"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">🌐 WebRTC</text>
    <text x="100" y="60" font-family="Arial, sans-serif" font-size="14" fill="#aaaaaa" text-anchor="middle">Peer-to-peer calls</text>
  </g>
  
  <!-- URL -->
  <text x="640" y="620" font-family="Arial, sans-serif" font-size="18" fill="#666666" text-anchor="middle">github.com/vantisCorp/VChat</text>
</svg>