[package]
name = "vcomm-core"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
authors = ["Vantis Corp <dev@vcomm.dev>"]
description = "Core Rust library for V-COMM secure communication platform"
license = "AGPL-3.0"
repository = "https://github.com/vantisCorp/VChat"
readme = "README.md"
keywords = ["secure", "communication", "e2ee", "privacy", "rust"]
categories = ["cryptography", "network-programming", "authentication"]

[lib]
name = "vcomm_core"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Cryptography
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
ed25519-dalek = { version = "2.0", features = ["rand_core"] }
curve25519-dalek = { version = "4.1", features = ["digest"] }
sha2 = "0.10"
sha3 = "0.10"
blake3 = "1.5"
argon2 = "0.5"
hkdf = "0.12"
rand = "0.8"
rand_core = { version = "0.6", features = ["std"] }
zeroize = { version = "1.7", features = ["derive"] }
subtle = "2.5"

# Signal Protocol
libsignal-protocol = { version = "0.1", optional = true }

# MLS (Messaging Layer Security)
openmls = { version = "0.5", optional = true }

# Post-Quantum Cryptography
pqc_kyber = { version = "0.8", optional = true }
pqc_dilithium = { version = "0.5", optional = true }

# WebAssembly
wasm-bindgen = { version = "0.2", features = ["serde-serialize"], optional = true }
js-sys = { version = "0.3", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }

# WebRTC
webrtc = { version = "0.11", optional = true }

# Networking
quinn = { version = "0.11", optional = true }
socket2 = "0.5"
tokio-tungstenite = { version = "0.21", optional = true }

# Error handling
thiserror = "1.0"
anyhow = "1.0"
color-eyre = "0.6"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "sqlite"], optional = true }
redis = { version = "0.24", features = ["tokio-comp", "connection-manager"], optional = true }

# IPFS
ipfs-api = { version = "0.17", optional = true }
ipfs-api-backend-hyper = { version = "0.6", optional = true }

# Utilities
bytes = "1.5"
hex = "0.4"
base64 = "0.21"
uuid = { version = "1.6", features = ["v4", "serde", "rust"] }
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1.19"
parking_lot = { version = "0.12", features = ["deadlock_detection"] }
dashmap = "5.5"
arc-swap = "1.6"

# Metrics & Telemetry
prometheus = { version = "0.13", optional = true }
sentry = { version = "0.32", features = ["rustls"], optional = true }

[dev-dependencies]
criterion = "0.5"
proptest = "1.4"
quickcheck = "1.0"
quickcheck_macros = "1.0"
tokio-test = "0.4"
mockall = "0.12"

[features]
default = ["full"]
full = [
    "signal",
    "mls",
    "pqc",
    "webrtc",
    "quic",
    "websocket",
    "database",
    "ipfs",
    "metrics",
    "telemetry"
]
signal = ["libsignal-protocol"]
mls = ["openmls"]
pqc = ["pqc_kyber", "pqc_dilithium"]
webrtc = ["dep:webrtc"]
quic = ["dep:quinn"]
websocket = ["tokio-tungstenite"]
database = ["sqlx", "redis"]
ipfs = ["ipfs-api", "ipfs-api-backend-hyper"]
metrics = ["prometheus"]
telemetry = ["sentry"]
wasm = ["wasm-bindgen", "js-sys", "wasm-bindgen-futures"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.cargo-udeps.ignore]
normal = ["wasm-bindgen"]